<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metanoia — Sistema de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --black: #000000;
  --white: #ffffff;
  --gray-50: #f9f9f9;
  --gray-100: #f0f0f0;
  --gray-200: #e0e0e0;
  --gray-400: #999999;
  --gray-600: #555555;
  --gray-800: #222222;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

/* ── LAYOUT */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--black); color: var(--white); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform 0.25s; }
.sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid #222; }
.sidebar-logo .mn-title { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; }
.sidebar-logo .mn-sub { font-size: 10px; color: var(--gray-400); letter-spacing: 0.08em; margin-top: 2px; }
.sidebar-logo .mn-circle { width: 44px; height: 44px; border: 1.5px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
.nav-section { padding: 12px 0 4px; }
.nav-label { font-size: 9px; color: var(--gray-400); letter-spacing: 0.12em; padding: 0 20px 6px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 13px; color: #ccc; cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { background: #111; color: #fff; }
.nav-item.active { background: #111; color: #fff; border-left-color: #fff; }
.nav-item .nav-icon { font-size: 16px; width: 18px; text-align: center; }
.sidebar-role { padding: 16px 20px; margin-top: auto; border-top: 1px solid #222; font-size: 11px; color: var(--gray-400); }
.sidebar-role strong { display: block; color: #fff; font-size: 12px; margin-bottom: 2px; }
.main { margin-left: 220px; flex: 1; min-height: 100vh; }
.topbar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.content { padding: 28px; max-width: 1100px; }

/* ── LOGIN */
.login-screen { min-height: 100vh; background: var(--black); display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-box { background: #111; border: 1px solid #333; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; text-align: center; }
.login-logo-circle { width: 72px; height: 72px; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
.login-title { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 0.08em; }
.login-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; margin-bottom: 32px; }
.login-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.login-btn { background: #1a1a1a; border: 1px solid #333; border-radius: var(--radius); padding: 16px 12px; cursor: pointer; text-align: left; transition: all 0.15s; color: #fff; }
.login-btn:hover { border-color: #666; background: #222; }
.login-btn.full { grid-column: span 2; }
.login-btn .lb-icon { font-size: 20px; margin-bottom: 8px; }
.login-btn .lb-name { font-size: 13px; font-weight: 600; display: block; }
.login-btn .lb-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.login-version { font-size: 10px; color: #444; margin-top: 20px; }

/* ── CARDS & COMPONENTS */
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 16px; }
.metric-label { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 700; }
.metric-sub { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.badge-black { background: var(--black); color: var(--white); }
.badge-gray { background: var(--gray-100); color: var(--gray-600); }
.badge-green { background: #e6f4ea; color: #1a7a2e; }
.badge-amber { background: #fef3cd; color: #856404; }
.badge-red { background: #fce8e8; color: #8b0000; }

/* ── FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
  padding: 9px 12px; font-size: 13px; background: var(--white); color: var(--gray-800);
  font-family: inherit; transition: border 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gray-600); }
.field textarea { resize: vertical; min-height: 72px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
.btn-primary { background: var(--black); color: var(--white); }
.btn-primary:hover { background: #222; }
.btn-secondary { background: var(--white); color: var(--gray-800); border-color: var(--gray-200); }
.btn-secondary:hover { background: var(--gray-50); }
.btn-danger { background: #fff0f0; color: #c00; border-color: #fcc; }
.btn-danger:hover { background: #ffe0e0; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* ── TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
td { padding: 12px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-50); }
.td-name { font-weight: 500; }

/* ── MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--white); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 16px; font-weight: 600; }
.btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-400); padding: 0; }

/* ── ESCALA */
.escala-dept { margin-bottom: 20px; }
.escala-dept-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-600); padding: 8px 0; border-bottom: 1px solid var(--gray-200); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.escala-slot { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
.escala-slot:last-child { border-bottom: none; }
.slot-funcao { font-size: 12px; color: var(--gray-400); width: 160px; flex-shrink: 0; }
.slot-pessoa { flex: 1; }
.slot-pessoa select { width: 100%; font-size: 12px; padding: 6px 8px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); }

/* ── TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--black); color: var(--white); padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* ── DASHBOARD CHARTS */
.chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.chart-label { font-size: 12px; color: var(--gray-400); width: 80px; text-align: right; flex-shrink: 0; }
.chart-bar-bg { flex: 1; background: var(--gray-100); border-radius: 3px; height: 18px; overflow: hidden; }
.chart-bar-fill { height: 100%; background: var(--black); border-radius: 3px; transition: width 0.6s ease; }
.chart-val { font-size: 12px; font-weight: 600; width: 50px; }

/* ── TABS */
.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--gray-200); padding-bottom: 0; }
.tab { background: none; border: none; padding: 10px 16px; font-size: 13px; cursor: pointer; color: var(--gray-400); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab.active { color: var(--black); border-bottom-color: var(--black); font-weight: 500; }

/* ── DEPT COLOR DOTS */
.dept-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
.dot-recepcao { background: #3b82f6; }
.dot-louvor { background: #8b5cf6; }
.dot-midia { background: #f59e0b; }
.dot-bistro { background: #10b981; }
.dot-ofertas { background: #ef4444; }
.dot-estacionamento { background: #6366f1; }
.dot-lideranca { background: #000; }

/* ── RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-220px); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
  .metric-grid { grid-template-columns: 1fr 1fr; }
  .content { padding: 16px; }
  .topbar { padding: 12px 16px; }
}
.menu-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; }
@media (max-width: 768px) { .menu-toggle { display: block; } }

.empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); font-size: 14px; }
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.section-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-actions h2 { font-size: 18px; font-weight: 600; }
.visitors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.visitor-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px; }
.visitor-card-name { font-weight: 600; font-size: 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.visitor-card-detail { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
.relatorio-secao { border-left: 3px solid var(--black); padding-left: 14px; margin-bottom: 20px; }
.relatorio-secao-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray-400); margin-bottom: 8px; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo-circle">MN</div>
    <div class="login-title">METANOIA</div>
    <div class="login-sub">Ministério de Jovens · AD Parque da Matriz</div>
    <div class="login-grid">
      <button class="login-btn" onclick="doLogin('lideranca')">
        <div class="lb-icon">✦</div>
        <span class="lb-name">Liderança</span>
        <span class="lb-desc">Acesso completo</span>
      </button>
      <button class="login-btn" onclick="doLogin('recepcao')">
        <div class="lb-icon">🚪</div>
        <span class="lb-name">Recepção</span>
        <span class="lb-desc">Presença e visitantes</span>
      </button>
      <button class="login-btn" onclick="doLogin('bistro')">
        <div class="lb-icon">☕</div>
        <span class="lb-name">Bistrô</span>
        <span class="lb-desc">Vendas do culto</span>
      </button>
      <button class="login-btn" onclick="doLogin('midia')">
        <div class="lb-icon">🎬</div>
        <span class="lb-name">Mídia</span>
        <span class="lb-desc">Suporte técnico</span>
      </button>
      <button class="login-btn full" onclick="doLogin('financeiro')">
        <div class="lb-icon">🔒</div>
        <span class="lb-name">Financeiro</span>
        <span class="lb-desc">Ofertas e entradas · Restrito</span>
      </button>
    </div>
    <div class="login-version">v1.0 · Metanoia 2026</div>
  </div>
</div>

<div id="app" class="app" style="display:none">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="mn-circle">MN</div>
      <div class="mn-title">METANOIA</div>
      <div class="mn-sub">MINISTÉRIO DE JOVENS</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Principal</div>
      <div class="nav-item active" onclick="navigate('dashboard')"><span class="nav-icon">◉</span> Dashboard</div>
      <div class="nav-item" onclick="navigate('cultos')"><span class="nav-icon">📅</span> Cultos</div>
      <div class="nav-item" onclick="navigate('escalas')"><span class="nav-icon">📋</span> Escalas</div>
    </div>
    <div class="nav-section" id="nav-relatorio-section">
      <div class="nav-label">Pós-culto</div>
      <div class="nav-item" onclick="navigate('relatorio')"><span class="nav-icon">📝</span> Relatório</div>
      <div class="nav-item" onclick="navigate('visitantes')"><span class="nav-icon">👥</span> Visitantes</div>
    </div>
    <div class="nav-section" id="nav-admin-section">
      <div class="nav-label">Gestão</div>
      <div class="nav-item" onclick="navigate('voluntarios')"><span class="nav-icon">🙋</span> Voluntários</div>
      <div class="nav-item" id="nav-financeiro" onclick="navigate('financeiro')" style="display:none"><span class="nav-icon">💰</span> Financeiro</div>
    </div>
    <div class="sidebar-role">
      <strong id="sidebar-role-name">—</strong>
      <span id="sidebar-role-desc">—</span><br>
      <span style="cursor:pointer;color:#888;margin-top:6px;display:inline-block" onclick="doLogout()">← Sair</span>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title" id="page-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <span class="badge badge-black" id="topbar-role">—</span>
      </div>
    </div>
    <div class="content" id="page-content"></div>
  </div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://zfbqmylymbdfmrrucjao.supabase.co';
const SUPA_KEY = 'sb_publishable_NgNQsUtS0zMm-31zAIrGkw_ex91MyDA';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

const ROLES = {
  lideranca: { name: 'Liderança', desc: 'Pastor Alejandro & Erika', nav: ['dashboard','cultos','escalas','relatorio','visitantes','voluntarios','financeiro'] },
  recepcao:  { name: 'Recepção', desc: 'Equipe de recepção', nav: ['dashboard','escalas','relatorio','visitantes'] },
  bistro:    { name: 'Bistrô', desc: 'Equipe do bistrô', nav: ['dashboard','escalas','relatorio'] },
  midia:     { name: 'Mídia', desc: 'Equipe de mídia', nav: ['dashboard','escalas','relatorio'] },
  financeiro:{ name: 'Financeiro', desc: 'Equipe financeira', nav: ['dashboard','cultos','financeiro'] },
};

const DEPTS = [
  { key:'recepcao', label:'Recepção', dot:'dot-recepcao', funcs:['Portão principal','Acolhimento','Registro de visitantes'] },
  { key:'estacionamento', label:'Estacionamento', dot:'dot-estacionamento', funcs:['Controle de vagas','Organização','Segurança'] },
  { key:'louvor', label:'Louvor', dot:'dot-louvor', funcs:['Vocalista','Guitarra','Baixo','Bateria','Teclado','Backing vocal'] },
  { key:'midia', label:'Mídia', dot:'dot-midia', funcs:['Som','Projeção','Transmissão','Fotografia'] },
  { key:'bistro', label:'Bistrô', dot:'dot-bistro', funcs:['Preparo de alimentos','Atendimento','Caixa'] },
  { key:'ofertas', label:'Ofertas', dot:'dot-ofertas', funcs:['Coleta espécie','Controle PIX','Contagem'] },
  { key:'lideranca', label:'Liderança', dot:'dot-lideranca', funcs:['Pregador','Mestre de cerimônias','Abertura e boas-vindas'] },
];

let currentRole = null;
let currentPage = 'dashboard';
let allVoluntarios = [];
let allCultos = [];

function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function doLogin(role) {
  currentRole = role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebar-role-name').textContent = ROLES[role].name;
  document.getElementById('sidebar-role-desc').textContent = ROLES[role].desc;
  document.getElementById('topbar-role').textContent = ROLES[role].name;
  if (role === 'lideranca' || role === 'financeiro') document.getElementById('nav-financeiro').style.display = 'flex';
  loadData().then(() => navigate('dashboard'));
}

function doLogout() {
  currentRole = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

async function loadData() {
  const [v, c] = await Promise.all([
    db.from('voluntarios').select('*').eq('ativo', true).order('nome'),
    db.from('cultos').select('*').order('data', { ascending: false }),
  ]);
  allVoluntarios = v.data || [];
  allCultos = c.data || [];
}

function navigate(page) {
  if (!ROLES[currentRole].nav.includes(page) && page !== 'dashboard') {
    toast('Acesso não permitido para sua função.');
    return;
  }
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => { if (n.textContent.trim().toLowerCase().includes(page.substring(0,5))) n.classList.add('active'); });
  const titles = { dashboard:'Dashboard', cultos:'Cultos', escalas:'Escalas', relatorio:'Relatório Pós-Culto', visitantes:'Visitantes', voluntarios:'Voluntários', financeiro:'Financeiro' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const renders = { dashboard: renderDashboard, cultos: renderCultos, escalas: renderEscalas, relatorio: renderRelatorio, visitantes: renderVisitantes, voluntarios: renderVoluntarios, financeiro: renderFinanceiro };
  if (renders[page]) renders[page]();
}

// ══════════════════════════ DASHBOARD ══════════════════════════
async function renderDashboard() {
  const content = document.getElementById('page-content');
  content.innerHTML = '<div class="card"><div class="card-title">Carregando...</div></div>';
  
  const [recs, fins, vists, cultos] = await Promise.all([
    db.from('relatorios').select('*').eq('tipo','recepcao'),
    db.from('relatorios').select('*').eq('tipo','financeiro'),
    db.from('visitantes').select('*'),
    db.from('cultos').select('*').order('data', { ascending: false }).limit(6),
  ]);

  const r = recs.data || []; const f = fins.data || []; const v = vists.data || [];
  const totalPresentes = r.reduce((s,x) => s + (x.dados?.presentes||0), 0);
  const mediaPresentes = r.length ? Math.round(totalPresentes / r.length) : 0;
  const totalSalvos = (await db.from('relatorios').select('dados').eq('tipo','lideranca')).data?.reduce((s,x)=>s+(x.dados?.salvos||0),0)||0;
  const totalOferta = f.reduce((s,x) => s + (x.dados?.totalOferta||0), 0);
  const totalVisitantes = v.length;
  const retornos = v.filter(x => x.segunda_visita).length;

  const lastCultos = cultos.data || [];
  const chartMax = Math.max(...r.map(x=>x.dados?.presentes||0), 1);

  let html = `
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Média de presença</div><div class="metric-value">${mediaPresentes}</div><div class="metric-sub">por culto</div></div>
    <div class="metric"><div class="metric-label">Visitantes totais</div><div class="metric-value">${totalVisitantes}</div><div class="metric-sub">${retornos} retornaram</div></div>
    <div class="metric"><div class="metric-label">Salvos</div><div class="metric-value">${totalSalvos}</div><div class="metric-sub">total registrado</div></div>
    <div class="metric"><div class="metric-label">Cultos registrados</div><div class="metric-value">${r.length}</div><div class="metric-sub">com relatório</div></div>
  </div>`;

  if (currentRole === 'lideranca' || currentRole === 'financeiro') {
    html += `<div class="card"><div class="card-title">Financeiro</div>
    <div class="metric-grid">

      const dt = x.dados?.data ? new Date(x.dados.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}) : '—';
      const pct = Math.round((x.dados?.presentes||0)/chartMax*100);

  } else {
    html += `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tema</th><th>Pregador</th></tr></thead><tbody>`;
    lastCultos.forEach(c => {

async function saveCulto() {
  const data = document.getElementById('m-data').value;
  const tema = document.getElementById('m-tema').value;
  const pregador = document.getElementById('m-pregador').value;
  if (!data) { toast('Informe a data.'); return; }

async function deleteCulto(id) {

}

async function loadEscala() {
  const cultoId = document.getElementById('escala-culto-sel').value;
  const { data: escalas } = await db.from('escalas').select('*').eq('culto_id', cultoId);
  const ec = escalas || [];

  let html = `<div class="card"><div class="card-title">Escala do culto</div>`;
  DEPTS.forEach(dept => {
    html += `<div class="escala-dept"><div class="escala-dept-title"><span><span class="dept-dot ${dept.dot}"></span>${dept.label}</span></div>`;
    dept.funcs.forEach(func => {
      const slot = ec.find(e => e.departamento === dept.key && e.funcao === func);
      const vOpts = allVoluntarios
        .filter(v => !v.departamento || v.departamento === dept.key || currentRole === 'lideranca')
        .map(v => `<option value="${v.id}" ${slot?.voluntario_id===v.id?'selected':''}>${v.nome}</option>`).join('');
      html += `<div class="escala-slot">
        <span class="slot-funcao">${func}</span>
        <div class="slot-pessoa"><select onchange="saveSlot('${cultoId}','${dept.key}','${func}',this.value)">
          <option value="">— Não definido —</option>${vOpts}
        </select></div>
      </div>`;
    });
    html += `</div>`;
  });
  html += `<button class="btn btn-secondary btn-sm" onclick="exportEscala('${cultoId}')">📤 Exportar escala</button></div>`;
  document.getElementById('escala-content').innerHTML = html;
}

async function saveSlot(cultoId, dept, func, volId) {
  await db.from('escalas').delete().match({ culto_id: cultoId, departamento: dept, funcao: func });
  if (volId) {
    await db.from('escalas').insert({ culto_id: cultoId, voluntario_id: volId, departamento: dept, funcao: func });
    toast('Escala salva!');
  }
}

async function exportEscala(cultoId) {
  const culto = allCultos.find(c => c.id === cultoId);
  const { data: escalas } = await db.from('escalas').select('*, voluntarios(nome)').eq('culto_id', cultoId);
  const dt = culto ? new Date(culto.data+'T12:00:00').toLocaleDateString('pt-BR') : '';
  let txt = `ESCALA METANOIA — ${dt}\n${culto?.tema||''}\n\n`;
  DEPTS.forEach(d => {
    const slots = (escalas||[]).filter(e => e.departamento === d.key);
    if (slots.length) { txt += `${d.label.toUpperCase()}\n`; slots.forEach(s => { txt += `  ${s.funcao}: ${s.voluntarios?.nome||'—'}\n`; }); txt += '\n'; }
  });
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `escala_metanoia_${dt.replace(/\//g,'-')}.txt`; a.click();
  toast('Escala exportada!');
}

async function saveRelatorio() {
  const cultoId = document.getElementById('rel-culto').value;
  const role = currentRole;
  const g = id => document.getElementById(id)?.value;

  const saves = [];

  if (['recepcao','lideranca'].includes(role)) {
    saves.push(db.from('relatorios').insert({ culto_id: cultoId, tipo: 'recepcao', dados: {
      presentes: parseInt(g('rel-presentes'))||0, membros: parseInt(g('rel-membros'))||0,
      data: allCultos.find(c=>c.id===cultoId)?.data
    }}));
  }
  if (['bistro','lideranca'].includes(role)) {
    saves.push(db.from('relatorios').insert({ culto_id: cultoId, tipo: 'bistro', dados: {
      totalBistro: parseFloat(g('rel-bistro'))||0, obs: g('rel-bistro-obs')
    }}));
  }
  if (['financeiro','lideranca'].includes(role)) {
    const esp = parseFloat(g('rel-especie'))||0, pix = parseFloat(g('rel-pix'))||0, out = parseFloat(g('rel-outras'))||0;
    saves.push(db.from('relatorios').insert({ culto_id: cultoId, tipo: 'financeiro', dados: {
      especie: esp, pix, outras: out, outrasDesc: g('rel-outras-desc'), totalOferta: esp+pix+out
    }}));
  }
  if (role === 'lideranca') {
    saves.push(db.from('relatorios').insert({ culto_id: cultoId, tipo: 'lideranca', dados: {
      salvos: parseInt(g('rel-salvos'))||0, reconciliados: parseInt(g('rel-reconciliados'))||0,
      batismo: parseInt(g('rel-batismo'))||0, whatsapp: parseInt(g('rel-whatsapp'))||0,
      nota: g('rel-nota'), positivos: g('rel-positivos'), melhorar: g('rel-melhorar'), obs: g('rel-obs-lid')
    }}));
  }
  if (role === 'midia') {
    saves.push(db.from('relatorios').insert({ culto_id: cultoId, tipo: 'midia', dados: {
      problemas: g('rel-midia-prob'), obs: g('rel-midia-obs')
    }}));
  }

  await Promise.all(saves);
  toast('Relatório salvo com sucesso!');
  navigate('dashboard');
}

      </div>
    </div>
    <div class="field"><label>Data de entrada</label><input type="date" id="vf-entrada" value="${v.data_entrada||''}"></div>
    <div class="field"><label>Observações</label><textarea id="vf-obs">${v.observacoes||''}</textarea></div>`;
}

function updateFuncOpts() {
  const dept = document.getElementById('vf-dept').value;
  const funcs = DEPTS.find(d=>d.key===dept)?.funcs||[];
  document.getElementById('vf-func').innerHTML = `<option value="">—</option>` + funcs.map(f=>`<option>${f}</option>`).join('');
}

function openModalVoluntario() {
  document.getElementById('modal-title').textContent = 'Novo Voluntário';
  document.getElementById('modal-body').innerHTML = volForm() + `<button class="btn btn-primary btn-full" style="margin-top:12px" onclick="saveVoluntario()">Salvar voluntário</button>`;
  document.getElementById('modal').classList.remove('hidden');
}

async function editVoluntario(id) {
  const v = allVoluntarios.find(x=>x.id===id);
  document.getElementById('modal-title').textContent = 'Editar Voluntário';
  document.getElementById('modal-body').innerHTML = volForm(v) +
    `<div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-primary" style="flex:1" onclick="updateVoluntario('${id}')">Salvar</button>
      <button class="btn btn-danger" onclick="deleteVoluntario('${id}')">Remover</button>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');
}

async function saveVoluntario() {
  const g = id => document.getElementById(id)?.value;
  if (!g('vf-nome')) { toast('Informe o nome.'); return; }
  const { error } = await db.from('voluntarios').insert({ nome:g('vf-nome'), telefone:g('vf-tel'), instagram:g('vf-ig'), email:g('vf-email'), departamento:g('vf-dept'), funcao:g('vf-func'), data_entrada:g('vf-entrada')||null, observacoes:g('vf-obs'), ativo:true });
  if (error) { toast('Erro: '+error.message); return; }
  toast('Voluntário salvo!'); closeModal(); await loadData(); renderVoluntarios();
}

async function updateVoluntario(id) {
  const g = i => document.getElementById(i)?.value;
  await db.from('voluntarios').update({ nome:g('vf-nome'), telefone:g('vf-tel'), instagram:g('vf-ig'), email:g('vf-email'), departamento:g('vf-dept'), funcao:g('vf-func'), data_entrada:g('vf-entrada')||null, observacoes:g('vf-obs') }).eq('id',id);
  toast('Atualizado!'); closeModal(); await loadData(); renderVoluntarios();
}

async function deleteVoluntario(id) {
  if (!confirm('Remover este voluntário?')) return;
  await db.from('voluntarios').update({ ativo: false }).eq('id',id);
  toast('Voluntário removido.'); closeModal(); await loadData(); renderVoluntarios();
}

// ══════════════════════════ FINANCEIRO ══════════════════════════
async function renderFinanceiro() {
  const content = document.getElementById('page-content');
  const { data } = await db.from('relatorios').select('*, cultos(data,tema)').eq('tipo','financeiro').order('created_at',{ascending:false});
  const fins = data || [];
  const totalOferta = fins.reduce((s,x)=>s+(x.dados?.totalOferta||0),0);
  const totalBistro = (await db.from('relatorios').select('dados').eq('tipo','bistro')).data?.reduce((s,x)=>s+(x.dados?.totalBistro||0),0)||0;

  let html = `<div class="metric-grid">
    <div class="metric"><div class="metric-label">Total de ofertas</div><div class="metric-value">R$${totalOferta.toLocaleString('pt-BR',{minimumFractionDigits:0})}</div></div>
    <div class="metric"><div class="metric-label">Total bistrô</div><div class="metric-value">R$${totalBistro.toLocaleString('pt-BR',{minimumFractionDigits:0})}</div></div>
    <div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">R$${(totalOferta+totalBistro).toLocaleString('pt-BR',{minimumFractionDigits:0})}</div></div>
    <div class="metric"><div class="metric-label">Cultos registrados</div><div class="metric-value">${fins.length}</div></div>
  </div>
  <div class="card"><div class="card-title">Histórico financeiro por culto</div>
  <div class="table-wrap"><table><thead><tr><th>Data</th><th>Espécie</th><th>PIX</th><th>Outras</th><th>Total oferta</th></tr></thead><tbody>`;

  if (!fins.length) html += `<tr><td colspan="5"><div class="empty-state">Nenhum registro financeiro ainda.</div></td></tr>`;
  fins.forEach(f => {
    const dt = f.cultos?.data ? new Date(f.cultos.data+'T12:00:00').toLocaleDateString('pt-BR') : '—';
    const d = f.dados||{};
    const fmt = v => `R$${(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    html += `<tr><td>${dt}${f.cultos?.tema?`<br><span style="font-size:11px;color:#999">${f.cultos.tema}</span>`:''}</td><td>${fmt(d.especie)}</td><td>${fmt(d.pix)}</td><td>${d.outras?fmt(d.outras)+'<br><span style="font-size:10px;color:#999">'+d.outrasDesc+'</span>':'—'}</td><td style="font-weight:600">${fmt(d.totalOferta)}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;
  content.innerHTML = html;
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
</script>

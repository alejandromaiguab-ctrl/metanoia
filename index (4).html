<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metanoia — Sistema de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#000;--white:#fff;--g50:#f9f9f9;--g100:#f0f0f0;--g200:#e0e0e0;--g400:#999;--g600:#555;--g800:#222;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;overflow-x:hidden}
.login-wrap{min-height:100vh;background:var(--black);display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:#111;border:1px solid #333;border-radius:16px;padding:36px 28px;width:100%;max-width:400px;text-align:center}
.logo-circle{width:90px;height:90px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.login-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:.08em}
.login-sub{font-size:12px;color:var(--g400);margin:4px 0 28px}
.f{margin-bottom:14px;text-align:left}
.f label{display:block;font-size:12px;color:#aaa;margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;border:1px solid var(--g200);border-radius:var(--rs);padding:9px 11px;font-size:14px;background:#fff;color:var(--g800);font-family:inherit;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--g600)}
.f textarea{resize:vertical;min-height:68px}
.f input[style*="background:#1a1a1a"]{background:#1a1a1a!important;border-color:#333!important;color:#fff!important}
.btn-login{width:100%;background:#fff;color:#000;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:hover{background:#eee}
.login-err{color:#f87171;font-size:13px;margin-top:10px;min-height:20px}
.app{display:none;min-height:100vh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.overlay.show{display:block}
.sidebar{width:220px;background:var(--black);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s;overflow-y:auto}
.sidebar.closed{transform:translateX(-220px)}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid #222}
.sb-circle{width:52px;height:52px;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
.sb-name{font-size:17px;font-weight:700;letter-spacing:.1em}
.sb-min{font-size:9px;color:var(--g400);letter-spacing:.08em}
.nav-sec{padding:10px 0 2px}
.nav-lbl{font-size:9px;color:var(--g400);letter-spacing:.12em;padding:0 18px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;color:#ccc;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:#111;color:#fff}
.nav-item.active{background:#111;color:#fff;border-left-color:#fff}
.nav-icon{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.sb-user{padding:14px 18px;margin-top:auto;border-top:1px solid #222}
.sb-user-info{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sb-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid #333;flex-shrink:0}
.sb-avatar-placeholder{width:34px;height:34px;border-radius:50%;background:#222;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#aaa;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:#fff}
.sb-user-role{font-size:11px;color:var(--g400);margin-top:1px}
.btn-logout{background:none;border:none;color:#666;font-size:11px;cursor:pointer;padding:0}
.btn-logout:hover{color:#aaa}
.main{min-height:100vh}
.main.pushed{margin-left:220px}
.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:none;border:1px solid var(--g200);border-radius:var(--rs);padding:6px 10px;font-size:18px;cursor:pointer;line-height:1}
.page-title{font-size:15px;font-weight:600}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-black{background:var(--black);color:#fff}
.badge-gray{background:var(--g100);color:var(--g600)}
.badge-green{background:#e6f4ea;color:#1a7a2e}
.badge-amber{background:#fef3cd;color:#856404}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-red{background:#fce8e8;color:#c00}
.content{padding:16px;max-width:100%}
@media(min-width:600px){.content{padding:24px;max-width:960px}}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:500px){.metric-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}}
.metric{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:14px}
.metric-label{font-size:11px;color:var(--g400);margin-bottom:3px}
.metric-value{font-size:24px;font-weight:700}
.metric-sub{font-size:11px;color:var(--g400);margin-top:2px}
.form-row{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:500px){.form-row{grid-template-columns:1fr 1fr}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--black);color:#fff}
.btn-primary:hover{background:#222}
.btn-secondary{background:#fff;color:var(--g800);border-color:var(--g200)}
.btn-secondary:hover{background:var(--g50)}
.btn-danger{background:#fff0f0;color:#c00;border-color:#fcc}
.btn-danger:hover{background:#ffe0e0}
.btn-wpp{background:#25D366;color:#fff;border:none}
.btn-wpp:hover{background:#1da851}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.sec-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sec-actions h2{font-size:17px;font-weight:600}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:360px}
th{text-align:left;font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;padding:9px 12px;border-bottom:1px solid var(--g200);background:var(--g50);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g50)}
.td-name{font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal-overlay.hidden{display:none}
@media(min-width:600px){.modal-overlay{align-items:center;padding:1rem}}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:520px;max-height:85vh}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g400);padding:0;line-height:1}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:11px 20px;border-radius:var(--rs);font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-label{font-size:11px;color:var(--g400);width:60px;text-align:right;flex-shrink:0}
.chart-bg{flex:1;background:var(--g100);border-radius:3px;height:16px;overflow:hidden}
.chart-fill{height:100%;background:var(--black);border-radius:3px;transition:width .6s}
.chart-val{font-size:11px;font-weight:600;width:40px;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot-recepcao{background:#3b82f6}.dot-estacionamento{background:#6366f1}.dot-louvor{background:#8b5cf6}
.dot-midia{background:#f59e0b}.dot-bistro{background:#10b981}.dot-ofertas{background:#ef4444}.dot-lideranca{background:#000}.dot-intercessao{background:#ec4899}
.escala-dept{margin-bottom:18px}
.escala-dept-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g600);padding:7px 0;border-bottom:1px solid var(--g200);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.escala-dept-locked{font-size:10px;color:var(--g400);font-weight:400;text-transform:none;letter-spacing:0}
.escala-slot{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g100);flex-wrap:wrap}
.escala-slot:last-child{border-bottom:none}
.slot-func{font-size:12px;color:var(--g400);width:100%;margin-bottom:4px}
@media(min-width:400px){.slot-func{width:150px;margin-bottom:0}}
.slot-sel{flex:1;min-width:0}
.slot-sel select{width:100%;font-size:12px;padding:6px 8px;border:1px solid var(--g200);border-radius:var(--rs);background:#fff}
.slot-sel select:disabled{background:var(--g50);color:var(--g400)}
.slot-assigned{font-size:13px;color:var(--g800);flex:1}
.presenca-btn{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--g200);cursor:pointer;background:#fff}
.presenca-sim{background:#e6f4ea;color:#1a7a2e;border-color:#1a7a2e}
.presenca-nao{background:#fce8e8;color:#c00;border-color:#fcc}
.visitors-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:500px){.visitors-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}}
.v-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px}
.v-name{font-weight:600;font-size:14px;margin-bottom:5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.v-detail{font-size:12px;color:var(--g400);margin-top:3px;display:flex;align-items:center;gap:5px}
.v-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.v-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:1px solid var(--g200);flex-shrink:0}
.v-avatar-placeholder{width:48px;height:48px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.empty-state{text-align:center;padding:36px 16px;color:var(--g400);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:10px}
.restricted-note{background:var(--g50);border-left:3px solid var(--black);padding:10px 12px;border-radius:0 var(--rs) var(--rs) 0;font-size:12px;color:var(--g600);margin-bottom:14px}
.tab-bar{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--g200);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;padding:9px 14px;font-size:13px;cursor:pointer;color:var(--g400);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--black);border-bottom-color:var(--black);font-weight:500}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g100);gap:8px;flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.u-name{font-size:14px;font-weight:500}
.u-email{font-size:12px;color:var(--g400);margin-top:1px}
.foto-upload-wrap{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.foto-preview{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--g200)}
.foto-preview-placeholder{width:64px;height:64px;border-radius:50%;background:var(--g100);border:2px dashed var(--g200);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.aviso-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:3px solid var(--black)}
.aviso-titulo{font-weight:600;font-size:14px;margin-bottom:4px}
.aviso-msg{font-size:13px;color:var(--g600);line-height:1.5}
.aviso-meta{font-size:11px;color:var(--g400);margin-top:8px}
.decisao-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}
.decisao-nome{font-weight:600;font-size:14px}
.decisao-tipo{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px}
.tipo-salvo{background:#e6f4ea;color:#1a7a2e}
.tipo-batismo{background:#e8f0fe;color:#1a56db}
.tipo-reconciliado{background:#fef3cd;color:#856404}
.semana-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.semana-box{flex:1;min-width:80px;border:1px solid var(--g200);border-radius:var(--rs);padding:6px 8px;font-size:11px}
.semana-label{font-weight:600;color:var(--g600);margin-bottom:2px}
.semana-status{font-size:10px}
.membro-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.membro-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:1px solid var(--g200);flex-shrink:0}
.membro-avatar-ph{width:48px;height:48px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.membro-info{flex:1}
.membro-nome{font-weight:600;font-size:14px}
.membro-detalhe{font-size:12px;color:var(--g400);margin-top:2px}
.membro-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:1fr;gap:8px}
.cal-evento{background:#fff;border:1px solid var(--g200);border-radius:var(--rs);padding:12px;border-left:4px solid var(--black);display:flex;gap:12px;align-items:flex-start}
.cal-data{min-width:50px;text-align:center;font-size:11px;color:var(--g400)}
.cal-dia{font-size:22px;font-weight:700;color:var(--g800);line-height:1}
.cal-info{flex:1}
.cal-titulo{font-weight:600;font-size:13px}
.cal-detalhe{font-size:11px;color:var(--g400);margin-top:2px}
.aniv-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)}
.aniv-item:last-child{border-bottom:none}
.aniv-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--g200)}
.aniv-avatar-ph{width:36px;height:36px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:14px}
.aniv-info{flex:1}
.aniv-nome{font-size:13px;font-weight:500}
.aniv-data{font-size:11px;color:var(--g400)}
.filtro-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filtro-bar select,.filtro-bar input{font-size:13px;padding:7px 10px;border:1px solid var(--g200);border-radius:var(--rs);background:#fff;font-family:inherit}
</style>
</head>

async function uploadFoto(file,pasta){
  const ext=file.name.split('.').pop();
  const nome=`${pasta}/${Date.now()}.${ext}`;
  const{data,error}=await db.storage.from('fotos').upload(nome,file,{upsert:true});
  if(error){toast('Erro no upload.');return null;}
  return nome;
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const senha=document.getElementById('l-senha').value;
  const errEl=document.getElementById('login-err');
  errEl.textContent='';
  if(!email||!senha){errEl.textContent='Preencha email e senha.';return;}
  errEl.textContent='Entrando...';
  const{data,error}=await db.auth.signInWithPassword({email,password:senha});
  if(error){
    const msgs={'Invalid login credentials':'Email ou senha incorretos.','Email not confirmed':'Email não confirmado. Contate o administrador.','Too many requests':'Muitas tentativas. Aguarde alguns minutos.'};
    errEl.textContent=msgs[error.message]||'Erro: '+error.message;
    return;
  }
  currentUser=data.user;
  await initApp();
}

  const{data:profile}=await db.from('perfis').select('*').eq('id',currentUser.id).single();

  const allowed=ROLE_NAV[currentRole]||[];

async function renderBoasVindas(){
  const c=document.getElementById('content');
  const hora=new Date().getHours();
  const saudacao=hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite';
  const nome=(currentProfile?.nome||'').split(' ')[0]||'';
  const vers=VERSICULOS[Math.floor(Math.random()*VERSICULOS.length)];
  const allowed=(ROLE_NAV[currentRole]||[]).filter(p=>p!=='boasvindas');

  let html=`<div style="background:var(--black);border-radius:var(--r);padding:28px 24px;margin-bottom:16px;color:#fff">
    <div style="font-size:13px;color:#aaa;margin-bottom:4px">${hora<12?'🌅':hora<18?'☀️':'🌙'} ${hora<12?'Bom dia':hora<18?'Boa tarde':'Boa noite'}, ${nome}!</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:16px">Bem-vindo ao Metanoia 👋</div>
    <div style="background:#111;border-radius:var(--rs);padding:16px;border-left:3px solid #444">
      <div style="font-size:13px;color:#ccc;line-height:1.6;font-style:italic">${vers.texto}</div>
      <div style="font-size:11px;color:#666;margin-top:8px;font-weight:600">${vers.ref}</div>
    </div>
  </div>`;

  // Avisos ativos
  const{data:avisos}=await db.from('avisos').select('*').eq('ativo',true).order('created_at',{ascending:false}).limit(3);
  if(avisos&&avisos.length){
    html+=`<div class="card"><div class="card-title">📢 Avisos da Liderança</div>`;
    avisos.forEach(a=>{html+=`<div style="padding:10px 0;border-bottom:1px solid var(--g100)"><div style="font-weight:600;font-size:13px">${a.titulo}</div><div style="font-size:12px;color:var(--g600);margin-top:3px">${a.mensagem}</div></div>`;});
    html+=`</div>`;
  }

  // Atalhos rápidos
  html+=`<div class="card"><div class="card-title">Acesso rápido</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">`;
  allowed.forEach(page=>{
    html+=`<button onclick="navigate('${page}')" style="background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:16px 12px;text-align:center;cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.background='var(--black)';this.style.color='#fff'" onmouseout="this.style.background='var(--g50)';this.style.color=''">
      <div style="font-size:22px;margin-bottom:6px">${PAGE_ICONS[page]||'▸'}</div>
      <div style="font-size:12px;font-weight:500">${PAGE_LABELS[page]||page}</div>
    </button>`;
  });
  html+=`</div></div>`;

  // Aniversariantes desta semana
  const hoje=new Date();const semFim=new Date(hoje);semFim.setDate(semFim.getDate()+7);
  const[volsA,vistsA,membA]=await Promise.all([
    db.from('voluntarios').select('nome,data_nascimento,foto_url').eq('ativo',true).not('data_nascimento','is',null),
    db.from('visitantes').select('nome,data_nascimento,foto_url').not('data_nascimento','is',null),
    db.from('membros').select('nome,data_nascimento,foto_url').eq('status','ativo').not('data_nascimento','is',null),
  ]);
  const anivs=[...(volsA.data||[]).map(x=>({...x,tipo:'Voluntário'})),...(vistsA.data||[]).map(x=>({...x,tipo:'Visitante'})),...(membA.data||[]).map(x=>({...x,tipo:'Membro'}))].filter(p=>{
    const dn=new Date(p.data_nascimento+'T12:00:00');
    const aniv=new Date(hoje.getFullYear(),dn.getMonth(),dn.getDate());
    if(aniv<hoje)aniv.setFullYear(aniv.getFullYear()+1);
    return aniv<=semFim;
  });
  if(anivs.length){
    html+=`<div class="card"><div class="card-title">🎂 Aniversariantes esta semana</div>`;
    anivs.forEach(p=>{const dn=new Date(p.data_nascimento+'T12:00:00');const url=fotoUrl(p.foto_url);html+=`<div class="aniv-item">${url?`<img src="${url}" class="aniv-avatar">`:`<div class="aniv-avatar-ph">🎂</div>`}<div class="aniv-info"><div class="aniv-nome">${p.nome}</div><div class="aniv-data">${dn.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})} · ${p.tipo}</div></div></div>`;});
    html+=`</div>`;
  }

  c.innerHTML=html;
}

// ── DASHBOARD
async function renderDashboard(){
  const c=document.getElementById('content');
  c.innerHTML='<div class="card"><div class="empty-state">Carregando...</div></div>';
  const[recs,vists,dec]=await Promise.all([
    db.from('relatorios').select('dados').eq('tipo','recepcao'),
    db.from('visitantes').select('id,segunda_visita'),
    db.from('decisoes').select('id,tipo,situacao'),
  ]);
  const r=recs.data||[],v=vists.data||[],d=dec.data||[];
  const mediaP=r.length?Math.round(r.reduce((s,x)=>s+(x.dados?.presentes||0),0)/r.length):0;
  const salvos=d.filter(x=>x.tipo==='salvo').length;
  const ret=v.filter(x=>x.segunda_visita).length;

  // Filtros dashboard
  let html=`<div class="filtro-bar">
    <select id="db-filtro-culto" onchange="renderDashboard()"><option value="">Todos os cultos</option>${allCultos.map(c=>`<option value="${c.id}">${fmtDateShort(c.data)}${c.tema?' — '+c.tema:''}</option>`).join('')}</select>
  </div>`;

  html+=`<div class="metric-grid">
    <div class="metric"><div class="metric-label">Média de presença</div><div class="metric-value">${mediaP}</div><div class="metric-sub">por culto</div></div>
    <div class="metric"><div class="metric-label">Visitantes</div><div class="metric-value">${v.length}</div><div class="metric-sub">${ret} retornaram</div></div>
    <div class="metric"><div class="metric-label">Salvos registrados</div><div class="metric-value">${salvos}</div></div>
    <div class="metric"><div class="metric-label">Cultos registrados</div><div class="metric-value">${r.length}</div></div>
  </div>`;

  if(CAN_FIN.includes(currentRole)){
    const fins=(await db.from('relatorios').select('dados').eq('tipo','financeiro')).data||[];
    const tOf=fins.reduce((s,x)=>s+(x.dados?.totalOferta||0),0);
    const tBi=(await db.from('relatorios').select('dados').eq('tipo','bistro')).data?.reduce((s,x)=>s+(x.dados?.totalBistro||0),0)||0;
    html+=`<div class="card"><div class="card-title">Financeiro</div><div class="metric-grid">
      <div class="metric"><div class="metric-label">Total ofertas</div><div class="metric-value">R$${tOf.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div>
      <div class="metric"><div class="metric-label">Total bistrô</div><div class="metric-value">R$${tBi.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div>
    </div></div>`;
  }

  // Gráfico de presença
  if(r.length){
    const maxP=Math.max(...r.map(x=>x.dados?.presentes||0),1);
    html+=`<div class="card"><div class="card-title">Presença por culto</div>`;
    r.slice(-8).forEach(x=>{
      const dt=x.dados?.data?fmtDateShort(x.dados.data):'—';
      html+=`<div class="chart-row"><span class="chart-label">${dt}</span><div class="chart-bg"><div class="chart-fill" style="width:${Math.round((x.dados?.presentes||0)/maxP*100)}%"></div></div><span class="chart-val">${x.dados?.presentes||0}</span></div>`;
    });
    html+=`</div>`;
  }

  // Aniversariantes da semana
  const hoje=new Date();
  const semFim=new Date(hoje);semFim.setDate(semFim.getDate()+7);
  const[volsAniv,vistsAniv,membrosAniv]=await Promise.all([
    db.from('voluntarios').select('id,nome,data_nascimento,foto_url').eq('ativo',true).not('data_nascimento','is',null),
    db.from('visitantes').select('id,nome,data_nascimento,foto_url').not('data_nascimento','is',null),
    db.from('membros').select('id,nome,data_nascimento,foto_url').eq('status','ativo').not('data_nascimento','is',null),
  ]);
  const todosAniv=[
    ...(volsAniv.data||[]).map(x=>({...x,tipo:'Voluntário'})),
    ...(vistsAniv.data||[]).map(x=>({...x,tipo:'Visitante'})),
    ...(membrosAniv.data||[]).map(x=>({...x,tipo:'Membro'})),
  ].filter(p=>{
    const dn=new Date(p.data_nascimento+'T12:00:00');
    const aniv=new Date(hoje.getFullYear(),dn.getMonth(),dn.getDate());
    if(aniv<hoje)aniv.setFullYear(aniv.getFullYear()+1);
    return aniv<=semFim;
  }).sort((a,b)=>{
    const da=new Date(a.data_nascimento+'T12:00:00');
    const db2=new Date(b.data_nascimento+'T12:00:00');
    const fa=new Date(hoje.getFullYear(),da.getMonth(),da.getDate());
    const fb=new Date(hoje.getFullYear(),db2.getMonth(),db2.getDate());
    if(fa<hoje)fa.setFullYear(fa.getFullYear()+1);
    if(fb<hoje)fb.setFullYear(fb.getFullYear()+1);
    return fa-fb;
  });

  if(todosAniv.length){
    html+=`<div class="card"><div class="card-title">🎂 Aniversariantes esta semana</div>`;
    todosAniv.forEach(p=>{
      const dn=new Date(p.data_nascimento+'T12:00:00');
      const url=fotoUrl(p.foto_url);
      html+=`<div class="aniv-item">
        ${url?`<img src="${url}" class="aniv-avatar">`:`<div class="aniv-avatar-ph">🎂</div>`}
        <div class="aniv-info"><div class="aniv-nome">${p.nome}</div><div class="aniv-data">${dn.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})} · ${p.tipo}</div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="card"><div class="card-title">Cultos recentes</div>`;
  if(!allCultos.length)html+=`<div class="empty-state"><div class="empty-icon">📅</div>Nenhum culto cadastrado.</div>`;
  else{

    <div id="esc-body"></div>`;
  loadEscala();

async function loadEscala(){
  const cid=document.getElementById('esc-sel').value;
  const{data:esc}=await db.from('escalas').select('*,voluntarios(nome,foto_url)').eq('culto_id',cid);
  const ec=esc||[];
  const myDepts=ROLE_DEPTS[currentRole];
  let html=`<div class="card"><div class="card-title">Escala do culto</div>`;
  DEPTS.forEach(d=>{
    const canEdit=!myDepts||myDepts.includes(d.key);
    html+=`<div class="escala-dept"><div class="escala-dept-title"><span><span class="dot ${d.dot}"></span>${d.label}</span>${!canEdit?'<span class="escala-dept-locked">preenchido pela equipe</span>':''}</div>`;
    d.funcs.forEach(f=>{
      const numSlots=d.slots?(d.slots[f]||d.slots.default||1):1;
      const qtd=d.slots&&d.slots[f]?d.slots[f]:d.slots?.default||1;
      for(let s=1;s<=qtd;s++){
        const slot=ec.find(e=>e.departamento===d.key&&e.funcao===f&&e.slot_numero===s);
        html+=`<div class="escala-slot"><span class="slot-func">${f}${qtd>1?` #${s}`:''}</span><div class="slot-sel">`;
        if(canEdit){
          const vOpts=allVols.map(v=>`<option value="${v.id}"${slot?.voluntario_id===v.id?' selected':''}>${v.nome}</option>`).join('');
          html+=`<select onchange="saveSlot('${cid}','${d.key}','${f}',${s},this.value)"><option value="">— Não definido —</option>${vOpts}</select>`;
          if(slot?.voluntario_id){
            const pClass=slot.compareceu===true?'presenca-sim':slot.compareceu===false?'presenca-nao':'';
            const pLabel=slot.compareceu===true?'✓ Presente':slot.compareceu===false?'✗ Faltou':'Presença?';
            html+=`<button class="presenca-btn ${pClass}" style="margin-left:6px" onclick="togglePresenca('${slot.id}',${slot.compareceu})">${pLabel}</button>`;
          }
        }else{
          html+=`<span class="slot-assigned">${slot?.voluntarios?.nome||'<span style="color:var(--g400)">—</span>'}</span>`;
        }
        html+=`</div></div>`;
      }
    });
    html+=`</div>`;
  });
  html+=`<button class="btn btn-secondary btn-sm" onclick="exportEscala('${cid}')">📤 Exportar TXT</button></div>`;
  document.getElementById('esc-body').innerHTML=html;
}

async function saveSlot(cid,dept,func,slot,vid){
  await db.from('escalas').delete().match({culto_id:cid,departamento:dept,funcao:func,slot_numero:slot});
  if(vid){await db.from('escalas').insert({culto_id:cid,voluntario_id:vid,departamento:dept,funcao:func,slot_numero:slot});toast('Salvo!');}
  loadEscala();
}

async function togglePresenca(id,atual){
  let novo=atual===true?false:atual===false?null:true;
  await db.from('escalas').update({compareceu:novo}).eq('id',id);
  toast(novo===true?'Marcado como presente':novo===false?'Marcado como faltou':'Presença removida');
  loadEscala();
}

async function exportEscala(cid){
  const culto=allCultos.find(c=>c.id===cid);
  const{data:esc}=await db.from('escalas').select('*,voluntarios(nome)').eq('culto_id',cid);
  const dt=culto?new Date(culto.data+'T12:00:00').toLocaleDateString('pt-BR'):'';
  let txt=`ESCALA METANOIA — ${dt}\n${culto?.tema||''}\n\n`;
  DEPTS.forEach(d=>{const slots=(esc||[]).filter(e=>e.departamento===d.key);if(slots.length){txt+=`${d.label.toUpperCase()}\n`;slots.forEach(s=>{txt+=`  ${s.funcao}${s.slot_numero>1?` #${s.slot_numero}`:''}: ${s.voluntarios?.nome||'—'}\n`;});txt+='\n';}});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`escala_${dt.replace(/\//g,'-')}.txt`;a.click();
  toast('Exportado!');
}

function previewFoto(inputId,previewId){
  const file=document.getElementById(inputId)?.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const el=document.getElementById(previewId);
    if(el.tagName==='IMG'){el.src=e.target.result;}
    else{el.outerHTML=`<img src="${e.target.result}" class="foto-preview" id="${previewId}">`;};
  };
  reader.readAsDataURL(file);
}

  DEPTS.forEach(d=>{
    const vs=byD[d.key];if(!vs.length)return;
    html+=`<div class="card"><div class="card-title"><span class="dot ${d.dot}"></span>${d.label}</div><div class="tbl-wrap"><table><thead><tr><th></th><th>Nome</th><th>Função</th><th>Telefone</th><th>WhatsApp</th><th></th></tr></thead><tbody>`;
    vs.forEach(v=>{
      const wpp=wppLink(v.telefone);
      const url=fotoUrl(v.foto_url);
      html+=`<tr><td style="width:36px">${url?`<img src="${url}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`:`<div style="width:32px;height:32px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:12px">👤</div>`}</td><td class="td-name">${v.nome}</td><td>${v.funcao||'—'}</td><td>${v.telefone||'—'}</td><td>${wpp?`<a href="${wpp}" target="_blank" class="btn btn-wpp btn-sm" style="text-decoration:none">💬</a>`:'—'}</td><td><button class="btn btn-secondary btn-sm" onclick="editVol('${v.id}')">Editar</button></td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  if(semD.length){
    html+=`<div class="card"><div class="card-title">Sem departamento</div><div class="tbl-wrap"><table><thead><tr><th></th><th>Nome</th><th>Telefone</th><th></th></tr></thead><tbody>`;
    semD.forEach(v=>{const wpp=wppLink(v.telefone);const url=fotoUrl(v.foto_url);html+=`<tr><td style="width:36px">${url?`<img src="${url}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`:`<div style="width:32px;height:32px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:12px">👤</div>`}</td><td class="td-name">${v.nome}</td><td>${v.telefone||'—'}</td><td><button class="btn btn-secondary btn-sm" onclick="editVol('${v.id}')">Editar</button></td></tr>`;});
    html+=`</tbody></table></div></div>`;
  }
  if(!allVols.length)html+=`<div class="card"><div class="empty-state"><div class="empty-icon">🙋</div>Nenhum voluntário cadastrado.</div></div>`;
  document.getElementById('content').innerHTML=html;
}

function volFormHtml(v={}){
  const dOpts=`<option value="">— Selecionar —</option>`+DEPTS.map(d=>`<option value="${d.key}"${v.departamento===d.key?' selected':''}>${d.label}</option>`).join('');
  const fOpts=v.departamento?(DEPTS.find(d=>d.key===v.departamento)?.funcs||[]).map(f=>`<option${v.funcao===f?' selected':''}>${f}</option>`).join(''):'';
  const urlAtual=fotoUrl(v.foto_url);
  return`
    <div class="foto-upload-wrap">
      ${urlAtual?`<img src="${urlAtual}" class="foto-preview" id="vf-foto-preview">`:`<div class="foto-preview-placeholder" id="vf-foto-preview" onclick="document.getElementById('vf-foto-input').click()">📷</div>`}
      <div><input type="file" id="vf-foto-input" accept="image/*" style="display:none" onchange="previewFoto('vf-foto-input','vf-foto-preview')" capture="environment"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('vf-foto-input').click()">Alterar foto</button></div>
    </div>
    <div class="form-row"><div class="f"><label>Nome</label><input type="text" id="vf-nome" value="${v.nome||''}" placeholder="Nome completo"></div><div class="f"><label>Telefone / WhatsApp</label><input type="tel" id="vf-tel" value="${v.telefone||''}" placeholder="(xx) xxxxx-xxxx"></div></div>
    <div class="form-row"><div class="f"><label>Instagram</label><input type="text" id="vf-ig" value="${v.instagram||''}" placeholder="@usuario"></div><div class="f"><label>Email</label><input type="email" id="vf-email" value="${v.email||''}"></div></div>
    <div class="form-row"><div class="f"><label>Data de nascimento</label><input type="date" id="vf-nasc" value="${v.data_nascimento||''}"></div><div class="f"><label>Data de entrada</label><input type="date" id="vf-entrada" value="${v.data_entrada||''}"></div></div>
    <div class="form-row"><div class="f"><label>Departamento</label><select id="vf-dept" onchange="updateFuncs()">${dOpts}</select></div><div class="f"><label>Função</label><select id="vf-func"><option value="">—</option>${fOpts}</select></div></div>
    <div class="f"><label>Observações</label><textarea id="vf-obs">${v.observacoes||''}</textarea></div>`;
}
function updateFuncs(prefix='vf'){const d=document.getElementById(`${prefix}-dept`)?.value||'';const fs=DEPTS.find(x=>x.key===d)?.funcs||[];const el=document.getElementById(`${prefix}-func`);if(el)el.innerHTML='<option value="">—</option>'+fs.map(f=>'<option>'+f+'</option>').join('');}
function openModalVol(){document.getElementById('modal-title').textContent='Novo Voluntário';document.getElementById('modal-body').innerHTML=volFormHtml()+`<button class="btn btn-primary btn-full" style="margin-top:10px" onclick="saveVol()">Salvar</button>`;document.getElementById('modal').classList.remove('hidden');}
async function editVol(id){const v=allVols.find(x=>x.id===id);document.getElementById('modal-title').textContent='Editar Voluntário';document.getElementById('modal-body').innerHTML=volFormHtml(v)+`<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" style="flex:1" onclick="updateVol('${id}')">Salvar</button><button class="btn btn-danger" onclick="deleteVol('${id}')">Remover</button></div>`;document.getElementById('modal').classList.remove('hidden');}
async function saveVol(){
  if(!gv('vf-nome')){toast('Informe o nome.');return;}
  let foto_url=null;
  const fi=document.getElementById('vf-foto-input');
  if(fi?.files[0])foto_url=await uploadFoto(fi.files[0],'voluntarios');
  await db.from('voluntarios').insert({nome:gv('vf-nome'),telefone:gv('vf-tel'),instagram:gv('vf-ig'),email:gv('vf-email'),departamento:gv('vf-dept'),funcao:gv('vf-func'),data_nascimento:gv('vf-nasc')||null,data_entrada:gv('vf-entrada')||null,observacoes:gv('vf-obs'),foto_url,ativo:true});
  toast('Salvo!');closeModal();await loadData();renderVoluntarios();
}
async function updateVol(id){
  let foto_url=undefined;
  const fi=document.getElementById('vf-foto-input');
  if(fi?.files[0])foto_url=await uploadFoto(fi.files[0],'voluntarios');
  const upd={nome:gv('vf-nome'),telefone:gv('vf-tel'),instagram:gv('vf-ig'),email:gv('vf-email'),departamento:gv('vf-dept'),funcao:gv('vf-func'),data_nascimento:gv('vf-nasc')||null,data_entrada:gv('vf-entrada')||null,observacoes:gv('vf-obs')};
  if(foto_url!==undefined)upd.foto_url=foto_url;
  await db.from('voluntarios').update(upd).eq('id',id);
  toast('Atualizado!');closeModal();await loadData();renderVoluntarios();
}
async function deleteVol(id){if(!confirm('Remover?'))return;await db.from('voluntarios').update({ativo:false}).eq('id',id);toast('Removido.');closeModal();await loadData();renderVoluntarios();}

// ── AVISOS
async function renderAvisos(){
  if(!CAN_AVISOS.includes(currentRole))return;
  const{data}=await db.from('avisos').select('*').order('created_at',{ascending:false});
  const av=data||[];
  let html=`<div class="sec-actions"><h2>Avisos Internos</h2><button class="btn btn-primary btn-sm" onclick="openModalAviso()">+ Novo Aviso</button></div>`;
  if(!av.length){html+=`<div class="card"><div class="empty-state"><div class="empty-icon">📢</div>Nenhum aviso publicado.</div></div>`;}
  else av.forEach(a=>{
    html+=`<div class="aviso-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="aviso-titulo">${a.titulo}</div><div class="aviso-msg">${a.mensagem}</div></div>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-left:10px">
          <button class="btn btn-secondary btn-sm" onclick="toggleAviso('${a.id}',${a.ativo})">${a.ativo?'Ocultar':'Mostrar'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAviso('${a.id}')">✕</button>
        </div>
      </div>
      <div class="aviso-meta">Por ${a.autor_nome||'—'} · ${new Date(a.created_at).toLocaleDateString('pt-BR')} · ${a.ativo?'<span style="color:#1a7a2e">Visível</span>':'<span style="color:#999">Oculto</span>'}</div>
    </div>`;
  });
  document.getElementById('content').innerHTML=html;
}
function openModalAviso(){
  document.getElementById('modal-title').textContent='Novo Aviso';
  document.getElementById('modal-body').innerHTML=`
    <div class="f"><label>Título</label><input type="text" id="av-titulo" placeholder="Título do aviso"></div>
    <div class="f"><label>Mensagem</label><textarea id="av-msg" placeholder="Conteúdo do aviso..."></textarea></div>
    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="saveAviso()">Publicar</button>`;
  document.getElementById('modal').classList.remove('hidden');
}
async function saveAviso(){
  if(!gv('av-titulo')||!gv('av-msg')){toast('Preencha título e mensagem.');return;}
  await db.from('avisos').insert({titulo:gv('av-titulo'),mensagem:gv('av-msg'),autor_id:currentUser.id,autor_nome:currentProfile?.nome||''});
  toast('Aviso publicado!');closeModal();renderAvisos();loadAvisosBanner();
}
async function toggleAviso(id,ativo){
  await db.from('avisos').update({ativo:!ativo}).eq('id',id);
  toast(ativo?'Aviso ocultado':'Aviso visível');renderAvisos();loadAvisosBanner();
}
async function deleteAviso(id){
  if(!confirm('Excluir aviso?'))return;
  await db.from('avisos').delete().eq('id',id);
  toast('Aviso excluído.');renderAvisos();loadAvisosBanner();
}

// ── FINANCEIRO
async function renderFinanceiro(){
  const{data}=await db.from('relatorios').select('*,cultos(data,tema)').eq('tipo','financeiro').order('created_at',{ascending:false});
  const fins=data||[];
  const tOf=fins.reduce((s,x)=>s+(x.dados?.totalOferta||0),0);
  const tBi=(await db.from('relatorios').select('dados').eq('tipo','bistro')).data?.reduce((s,x)=>s+(x.dados?.totalBistro||0),0)||0;
  let html=`<div class="metric-grid"><div class="metric"><div class="metric-label">Total ofertas</div><div class="metric-value">R$${tOf.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div><div class="metric"><div class="metric-label">Total bistrô</div><div class="metric-value">R$${tBi.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div><div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">R$${(tOf+tBi).toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div></div>
  <div class="card"><div class="card-title">Histórico por culto</div><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Espécie</th><th>PIX</th><th>Outras</th><th>Total</th></tr></thead><tbody>`;
  if(!fins.length)html+=`<tr><td colspan="5"><div class="empty-state">Sem registros.</div></td></tr>`;
  fins.forEach(f=>{const dt=f.cultos?.data?fmtDate(f.cultos.data):'—';const d=f.dados||{};const fm=v=>`R$${(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;html+=`<tr><td>${dt}</td><td>${fm(d.especie)}</td><td>${fm(d.pix)}</td><td>${d.outras?fm(d.outras):'—'}</td><td style="font-weight:600">${fm(d.totalOferta)}</td></tr>`;});
  html+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=html;
}

// ── USUÁRIOS
async function renderUsuarios(){
  const tabs=`<div class="tab-bar"><button class="tab active" onclick="switchUserTab('usuarios',this)">Usuários</button><button class="tab" onclick="switchUserTab('avisos',this)">Avisos</button></div>`;
  document.getElementById('content').innerHTML=tabs+`<div id="user-tab-content"></div>`;
  renderUsuariosList();
}
function switchUserTab(tab,btn){
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='usuarios')renderUsuariosList();
  else renderAvisos();
}
async function renderUsuariosList(){
  const{data:users}=await db.from('perfis').select('*').order('nome');
  let html=`<div class="sec-actions"><h2>Usuários</h2><button class="btn btn-primary btn-sm" onclick="openModalUser()">+ Novo</button></div><div class="card">`;
  if(!users||!users.length)html+=`<div class="empty-state"><div class="empty-icon">🔑</div>Nenhum usuário.</div>`;
  else users.forEach(u=>{
    const url=fotoUrl(u.foto_url);
    html+=`<div class="user-row">
      <div style="display:flex;align-items:center;gap:10px">
        ${url?`<img src="${url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`:`<div style="width:36px;height:36px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:14px">👤</div>`}
        <div><div class="u-name">${u.nome}</div><div class="u-email">${u.email||'—'} · <span class="badge badge-gray">${ROLE_LABELS[u.role]||u.role}</span></div></div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="deleteUser('${u.id}','${u.nome}')">Remover</button>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('user-tab-content').innerHTML=html;
}
function openModalUser(){
  document.getElementById('modal-title').textContent='Novo Usuário';
  document.getElementById('modal-body').innerHTML=`
    <div class="f"><label>Nome</label><input type="text" id="nu-nome" placeholder="Nome completo"></div>
    <div class="f"><label>Email</label><input type="email" id="nu-email" placeholder="email@email.com"></div>
    <div class="f"><label>Senha</label><input type="password" id="nu-senha" placeholder="Mínimo 6 caracteres"></div>
    <div class="f"><label>Perfil de acesso</label>
      <select id="nu-role">
        <option value="coordenador">Coordenador</option>
        <option value="lideranca">Liderança</option>
        <option value="recepcao">Recepção</option>
        <option value="bistro">Bistrô</option>
        <option value="midia">Mídia</option>
        <option value="financeiro">Financeiro</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="saveUser()">Criar usuário</button>
    <div id="user-err" style="color:#c00;font-size:13px;margin-top:8px"></div>`;
  document.getElementById('modal').classList.remove('hidden');
}
async function saveUser(){
  const nome=gv('nu-nome').trim(),email=gv('nu-email').trim(),senha=gv('nu-senha'),role=gv('nu-role');
  const err=document.getElementById('user-err');
  if(!nome||!email||!senha){err.textContent='Preencha todos os campos.';return;}
  if(senha.length<6){err.textContent='Senha mínima de 6 caracteres.';return;}
  const{data,error}=await db.auth.signUp({email,password:senha});
  if(error){err.textContent='Erro: '+error.message;return;}
  const uid=data?.user?.id;
  if(uid)await db.from('perfis').upsert({id:uid,nome,email,role});
  toast('Usuário criado!');closeModal();renderUsuariosList();
}
async function deleteUser(id,nome){
  if(!confirm(`Remover ${nome}?`))return;
  await db.from('perfis').delete().eq('id',id);
  toast('Removido.');renderUsuariosList();
}

function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('l-senha').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
db.auth.getSession().then(({data:{session}})=>{if(session){currentUser=session.user;initApp();}});
</script>
</body>
</html>

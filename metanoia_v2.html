<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metanoia — Sistema de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#000;--white:#fff;--g50:#f9f9f9;--g100:#f0f0f0;--g200:#e0e0e0;--g400:#999;--g600:#555;--g800:#222;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;overflow-x:hidden}

/* LOGIN */
.login-wrap{min-height:100vh;background:var(--black);display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:#111;border:1px solid #333;border-radius:16px;padding:36px 28px;width:100%;max-width:400px;text-align:center}
.logo-circle{width:68px;height:68px;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:20px;font-weight:700;color:#fff;letter-spacing:.05em}
.login-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:.08em}
.login-sub{font-size:12px;color:var(--g400);margin:4px 0 28px}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:12px;color:#aaa;margin-bottom:5px}
.field input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:var(--rs);padding:10px 12px;font-size:14px;color:#fff;font-family:inherit}
.field input:focus{outline:none;border-color:#666}
.btn-login{width:100%;background:#fff;color:#000;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:hover{background:#eee}
.login-err{color:#f87171;font-size:13px;margin-top:10px;min-height:20px}

/* APP LAYOUT */
.app{display:none;min-height:100vh}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.overlay.show{display:block}

/* SIDEBAR */
.sidebar{width:220px;background:var(--black);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s;overflow-y:auto}
.sidebar.closed{transform:translateX(-220px)}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid #222}
.sb-circle{width:42px;height:42px;border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-bottom:10px}
.sb-name{font-size:17px;font-weight:700;letter-spacing:.1em}
.sb-min{font-size:9px;color:var(--g400);letter-spacing:.08em}
.nav-sec{padding:10px 0 2px}
.nav-lbl{font-size:9px;color:var(--g400);letter-spacing:.12em;padding:0 18px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;color:#ccc;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:#111;color:#fff}
.nav-item.active{background:#111;color:#fff;border-left-color:#fff}
.nav-icon{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.sb-user{padding:14px 18px;margin-top:auto;border-top:1px solid #222}
.sb-user-name{font-size:12px;font-weight:600;color:#fff}
.sb-user-role{font-size:11px;color:var(--g400);margin-top:1px}
.btn-logout{background:none;border:none;color:#666;font-size:11px;cursor:pointer;margin-top:6px;padding:0}
.btn-logout:hover{color:#aaa}

/* MAIN */
.main{min-height:100vh;transition:margin .25s}
.main.pushed{margin-left:220px}
.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:none;border:1px solid var(--g200);border-radius:var(--rs);padding:6px 10px;font-size:18px;cursor:pointer;line-height:1}
.page-title{font-size:15px;font-weight:600}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.badge-black{background:var(--black);color:#fff}
.badge-gray{background:var(--g100);color:var(--g600)}
.badge-green{background:#e6f4ea;color:#1a7a2e}
.badge-amber{background:#fef3cd;color:#856404}

.content{padding:16px;max-width:100%}
@media(min-width:600px){.content{padding:24px;max-width:900px}}

/* CARDS */
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:500px){.metric-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}}
.metric{background:var(--g50);border:1px solid var(--g200);border-radius:var(--rs);padding:14px}
.metric-label{font-size:11px;color:var(--g400);margin-bottom:3px}
.metric-value{font-size:24px;font-weight:700}
.metric-sub{font-size:11px;color:var(--g400);margin-top:2px}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:500px){.form-row{grid-template-columns:1fr 1fr}}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;border:1px solid var(--g200);border-radius:var(--rs);padding:9px 11px;font-size:14px;background:#fff;color:var(--g800);font-family:inherit;transition:border .15s}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--g600)}
.f textarea{resize:vertical;min-height:68px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--black);color:#fff}
.btn-primary:hover{background:#222}
.btn-secondary{background:#fff;color:var(--g800);border-color:var(--g200)}
.btn-secondary:hover{background:var(--g50)}
.btn-danger{background:#fff0f0;color:#c00;border-color:#fcc}
.btn-danger:hover{background:#ffe0e0}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.sec-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sec-actions h2{font-size:17px;font-weight:600}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
th{text-align:left;font-size:10px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.06em;padding:9px 12px;border-bottom:1px solid var(--g200);background:var(--g50);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--g100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g50)}
.td-name{font-weight:500}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal-overlay.hidden{display:none}
@media(min-width:600px){.modal-overlay{align-items:center;padding:1rem}}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:500px;max-height:85vh}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g400);padding:0;line-height:1}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:11px 20px;border-radius:var(--rs);font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CHART */
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-label{font-size:11px;color:var(--g400);width:60px;text-align:right;flex-shrink:0}
.chart-bg{flex:1;background:var(--g100);border-radius:3px;height:16px;overflow:hidden}
.chart-fill{height:100%;background:var(--black);border-radius:3px;transition:width .6s}
.chart-val{font-size:11px;font-weight:600;width:40px;flex-shrink:0}

/* DEPT DOTS */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dot-recepcao{background:#3b82f6}.dot-estacionamento{background:#6366f1}.dot-louvor{background:#8b5cf6}
.dot-midia{background:#f59e0b}.dot-bistro{background:#10b981}.dot-ofertas{background:#ef4444}.dot-lideranca{background:#000}

/* ESCALA */
.escala-dept{margin-bottom:18px}
.escala-dept-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g600);padding:7px 0;border-bottom:1px solid var(--g200);margin-bottom:8px}
.escala-slot{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--g100);flex-wrap:wrap}
.escala-slot:last-child{border-bottom:none}
.slot-func{font-size:12px;color:var(--g400);width:100%;margin-bottom:4px}
@media(min-width:400px){.slot-func{width:150px;margin-bottom:0}}
.slot-sel{flex:1;min-width:0}
.slot-sel select{width:100%;font-size:12px;padding:6px 8px;border:1px solid var(--g200);border-radius:var(--rs);background:#fff}

.visitors-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:500px){.visitors-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}}
.v-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:14px}
.v-name{font-weight:600;font-size:14px;margin-bottom:5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.v-detail{font-size:12px;color:var(--g400);margin-top:3px}

.empty-state{text-align:center;padding:36px 16px;color:var(--g400);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:10px}
.restricted-note{background:var(--g50);border-left:3px solid var(--black);padding:10px 12px;border-radius:0 var(--rs) var(--rs) 0;font-size:12px;color:var(--g600);margin-bottom:14px}
.tab-bar{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--g200);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;padding:9px 14px;font-size:13px;cursor:pointer;color:var(--g400);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--black);border-bottom-color:var(--black);font-weight:500}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g100)}
.user-row:last-child{border-bottom:none}
.user-info .u-name{font-size:14px;font-weight:500}
.user-info .u-email{font-size:12px;color:var(--g400);margin-top:1px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap" class="login-wrap">
  <div class="login-box">
    <div class="logo-circle">MN</div>
    <div class="login-title">METANOIA</div>
    <div class="login-sub">Ministério de Jovens · AD Parque da Matriz</div>
    <div class="f"><label>Email</label><input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="f"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <nav class="sidebar closed" id="sidebar">
    <div class="sb-logo">
      <div class="sb-circle">MN</div>
      <div class="sb-name">METANOIA</div>
      <div class="sb-min">MINISTÉRIO DE JOVENS</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Principal</div>
      <div class="nav-item" data-page="dashboard"><span class="nav-icon">◉</span>Dashboard</div>
      <div class="nav-item" data-page="cultos"><span class="nav-icon">📅</span>Cultos</div>
      <div class="nav-item" data-page="escalas"><span class="nav-icon">📋</span>Escalas</div>
    </div>
    <div class="nav-sec">
      <div class="nav-lbl">Pós-culto</div>
      <div class="nav-item" data-page="relatorio"><span class="nav-icon">📝</span>Relatório</div>
      <div class="nav-item" data-page="visitantes"><span class="nav-icon">👥</span>Visitantes</div>
    </div>
    <div class="nav-sec" id="nav-gestao">
      <div class="nav-lbl">Gestão</div>
      <div class="nav-item" data-page="voluntarios"><span class="nav-icon">🙋</span>Voluntários</div>
      <div class="nav-item" data-page="financeiro" id="nav-fin"><span class="nav-icon">💰</span>Financeiro</div>
      <div class="nav-item" data-page="usuarios" id="nav-users"><span class="nav-icon">🔑</span>Usuários</div>
    </div>
    <div class="sb-user">
      <div class="sb-user-name" id="sb-nome">—</div>
      <div class="sb-user-role" id="sb-role">—</div>
      <button class="btn-logout" onclick="doLogout()">← Sair</button>
    </div>
  </nav>

  <div class="main" id="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="page-title" id="page-title">Dashboard</span>
      </div>
      <span class="badge badge-black" id="tb-role">—</span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://zfbqmylymbdfmrrucjao.supabase.co';
const SUPA_KEY='sb_publishable_NgNQsUtS0zMm-31zAIrGkw_ex91MyDA';
const {createClient}=supabase;
const db=createClient(SUPA_URL,SUPA_KEY);

const ROLE_LABELS={admin:'Admin',lideranca:'Liderança',recepcao:'Recepção',bistro:'Bistrô',midia:'Mídia',financeiro:'Financeiro'};
const ROLE_NAV={
  admin:['dashboard','cultos','escalas','relatorio','visitantes','voluntarios','financeiro','usuarios'],
  lideranca:['dashboard','cultos','escalas','relatorio','visitantes','voluntarios'],
  recepcao:['dashboard','escalas','relatorio','visitantes'],
  bistro:['dashboard','escalas','relatorio'],
  midia:['dashboard','escalas','relatorio'],
  financeiro:['dashboard','cultos','financeiro'],
};
const DEPTS=[
  {key:'recepcao',label:'Recepção',dot:'dot-recepcao',funcs:['Portão principal','Acolhimento','Registro de visitantes']},
  {key:'estacionamento',label:'Estacionamento',dot:'dot-estacionamento',funcs:['Controle de vagas','Organização','Segurança']},
  {key:'louvor',label:'Louvor',dot:'dot-louvor',funcs:['Vocalista','Guitarra','Baixo','Bateria','Teclado','Backing vocal']},
  {key:'midia',label:'Mídia',dot:'dot-midia',funcs:['Som','Projeção','Transmissão','Fotografia']},
  {key:'bistro',label:'Bistrô',dot:'dot-bistro',funcs:['Preparo de alimentos','Atendimento','Caixa']},
  {key:'ofertas',label:'Ofertas',dot:'dot-ofertas',funcs:['Coleta espécie','Controle PIX','Contagem']},
  {key:'lideranca',label:'Liderança',dot:'dot-lideranca',funcs:['Pregador','Mestre de cerimônias','Abertura e boas-vindas']},
];

let currentUser=null;
let currentRole=null;
let allVols=[];
let allCultos=[];
let sidebarOpen=false;

function toast(msg,d=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}

function toggleSidebar(){sidebarOpen?closeSidebar():openSidebar();}
function openSidebar(){sidebarOpen=true;document.getElementById('sidebar').classList.remove('closed');document.getElementById('overlay').classList.add('show');}
function closeSidebar(){sidebarOpen=false;document.getElementById('sidebar').classList.add('closed');document.getElementById('overlay').classList.remove('show');}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const senha=document.getElementById('l-senha').value;
  document.getElementById('login-err').textContent='';
  if(!email||!senha){document.getElementById('login-err').textContent='Preencha email e senha.';return;}
  const {data,error}=await db.auth.signInWithPassword({email,password:senha});
  if(error){document.getElementById('login-err').textContent='Email ou senha incorretos.';return;}
  currentUser=data.user;
  await initApp();
}

async function initApp(){
  const {data:profile}=await db.from('perfis').select('*').eq('id',currentUser.id).single();
  currentRole=profile?.role||'recepcao';
  document.getElementById('sb-nome').textContent=profile?.nome||currentUser.email;
  document.getElementById('sb-role').textContent=ROLE_LABELS[currentRole]||currentRole;
  document.getElementById('tb-role').textContent=ROLE_LABELS[currentRole]||currentRole;
  const allowed=ROLE_NAV[currentRole]||[];
  document.querySelectorAll('.nav-item[data-page]').forEach(n=>{
    const p=n.getAttribute('data-page');
    n.style.display=allowed.includes(p)?'flex':'none';
  });
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='block';
  await loadData();
  navigate('dashboard');
}

async function doLogout(){
  await db.auth.signOut();
  currentUser=null;currentRole=null;
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app').style.display='none';
  closeSidebar();
}

document.querySelectorAll('.nav-item[data-page]').forEach(n=>{
  n.addEventListener('click',()=>{navigate(n.getAttribute('data-page'));closeSidebar();});
});

async function loadData(){
  const [v,c]=await Promise.all([
    db.from('voluntarios').select('*').eq('ativo',true).order('nome'),
    db.from('cultos').select('*').order('data',{ascending:false}),
  ]);
  allVols=v.data||[];allCultos=c.data||[];
}

function navigate(page){
  const allowed=ROLE_NAV[currentRole]||[];
  if(!allowed.includes(page)){toast('Acesso não permitido.');return;}
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.querySelector(`.nav-item[data-page="${page}"]`);
  if(ni)ni.classList.add('active');
  const titles={dashboard:'Dashboard',cultos:'Cultos',escalas:'Escalas',relatorio:'Relatório Pós-Culto',visitantes:'Visitantes',voluntarios:'Voluntários',financeiro:'Financeiro',usuarios:'Usuários'};
  document.getElementById('page-title').textContent=titles[page]||page;
  ({dashboard:renderDashboard,cultos:renderCultos,escalas:renderEscalas,relatorio:renderRelatorio,visitantes:renderVisitantes,voluntarios:renderVoluntarios,financeiro:renderFinanceiro,usuarios:renderUsuarios}[page]||renderDashboard)();
}

// ── DASHBOARD
async function renderDashboard(){
  const c=document.getElementById('content');
  c.innerHTML='<div class="card"><div class="empty-state">Carregando...</div></div>';
  const [recs,fins,vists]=await Promise.all([
    db.from('relatorios').select('dados').eq('tipo','recepcao'),
    db.from('relatorios').select('dados').eq('tipo','financeiro'),
    db.from('visitantes').select('id,segunda_visita'),
  ]);
  const r=recs.data||[],f=fins.data||[],v=vists.data||[];
  const mediaP=r.length?Math.round(r.reduce((s,x)=>s+(x.dados?.presentes||0),0)/r.length):0;
  const salvos=(await db.from('relatorios').select('dados').eq('tipo','lideranca')).data?.reduce((s,x)=>s+(x.dados?.salvos||0),0)||0;
  const totalOf=f.reduce((s,x)=>s+(x.dados?.totalOferta||0),0);
  const retornos=v.filter(x=>x.segunda_visita).length;
  let html=`<div class="metric-grid">
    <div class="metric"><div class="metric-label">Média de presença</div><div class="metric-value">${mediaP}</div><div class="metric-sub">por culto</div></div>
    <div class="metric"><div class="metric-label">Visitantes</div><div class="metric-value">${v.length}</div><div class="metric-sub">${retornos} retornaram</div></div>
    <div class="metric"><div class="metric-label">Salvos</div><div class="metric-value">${salvos}</div></div>
    <div class="metric"><div class="metric-label">Cultos</div><div class="metric-value">${r.length}</div><div class="metric-sub">registrados</div></div>
  </div>`;
  if(['admin','financeiro','lideranca'].includes(currentRole)){
    const tb=(await db.from('relatorios').select('dados').eq('tipo','bistro')).data?.reduce((s,x)=>s+(x.dados?.totalBistro||0),0)||0;
    html+=`<div class="card"><div class="card-title">Financeiro</div><div class="metric-grid">
      <div class="metric"><div class="metric-label">Total ofertas</div><div class="metric-value">R$${totalOf.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div>
      <div class="metric"><div class="metric-label">Total bistrô</div><div class="metric-value">R$${tb.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div>
    </div></div>`;
  }
  if(r.length){

    r.slice(-8).forEach(x=>{
      const dt=x.dados?.data?new Date(x.dados.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'—';
      html+=`<div class="chart-row"><span class="chart-label">${dt}</span><div class="chart-bg"><div class="chart-fill" style="width:${Math.round((x.dados?.presentes||0)/maxP*100)}%"></div></div><span class="chart-val">${x.dados?.presentes||0}</span></div>`;
    });

  }
  html+=`<div class="card"><div class="card-title">Cultos recentes</div>`;

    html+=`<div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Tema</th><th>Pregador</th></tr></thead><tbody>`;
    allCultos.slice(0,5).forEach(c=>{
      const dt=new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      html+=`<tr><td>${dt}</td><td class="td-name">${c.tema||'—'}</td><td>${c.pregador||'—'}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;
  c.innerHTML=html;
}

async function renderEscalas(){

  if(!allCultos.length){document.getElementById('content').innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">📋</div>Cadastre um culto primeiro.</div></div>`;return;}
  const opts=allCultos.map(c=>{const dt=new Date(c.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});return`<option value="${c.id}">${dt}${c.tema?' — '+c.tema:''}</option>`;}).join('');
  document.getElementById('content').innerHTML=`<div class="card"><div class="card-title">Culto</div><div class="f"><select id="esc-sel" onchange="loadEscala()">${opts}</select></div></div><div id="esc-body"></div>`;

async function loadEscala(){
  const cid=document.getElementById('esc-sel').value;
  const {data:esc}=await db.from('escalas').select('*').eq('culto_id',cid);
  const ec=esc||[];
  let html=`<div class="card"><div class="card-title">Escala</div>`;
  DEPTS.forEach(d=>{
    html+=`<div class="escala-dept"><div class="escala-dept-title"><span class="dot ${d.dot}"></span>${d.label}</div>`;
    d.funcs.forEach(f=>{
      const slot=ec.find(e=>e.departamento===d.key&&e.funcao===f);
      const vOpts=allVols.map(v=>`<option value="${v.id}"${slot?.voluntario_id===v.id?' selected':''}>${v.nome}</option>`).join('');
      html+=`<div class="escala-slot"><span class="slot-func">${f}</span><div class="slot-sel"><select onchange="saveSlot('${cid}','${d.key}','${f}',this.value)"><option value="">— Não definido —</option>${vOpts}</select></div></div>`;
    });
    html+=`</div>`;
  });
  html+=`<button class="btn btn-secondary btn-sm" onclick="exportEscala('${cid}')">📤 Exportar TXT</button></div>`;
  document.getElementById('esc-body').innerHTML=html;
}
async function saveSlot(cid,dept,func,vid){
  await db.from('escalas').delete().match({culto_id:cid,departamento:dept,funcao:func});
  if(vid){await db.from('escalas').insert({culto_id:cid,voluntario_id:vid,departamento:dept,funcao:func});toast('Salvo!');}
}
async function exportEscala(cid){
  const culto=allCultos.find(c=>c.id===cid);
  const {data:esc}=await db.from('escalas').select('*,voluntarios(nome)').eq('culto_id',cid);
  const dt=culto?new Date(culto.data+'T12:00:00').toLocaleDateString('pt-BR'):'';
  let txt=`ESCALA METANOIA — ${dt}\n${culto?.tema||''}\n\n`;
  DEPTS.forEach(d=>{const slots=(esc||[]).filter(e=>e.departamento===d.key);if(slots.length){txt+=`${d.label.toUpperCase()}\n`;slots.forEach(s=>{txt+=`  ${s.funcao}: ${s.voluntarios?.nome||'—'}\n`;});txt+='\n';}});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`escala_${dt.replace(/\//g,'-')}.txt`;a.click();
  toast('Exportado!');
}

  let html=`<div class="metric-grid"><div class="metric"><div class="metric-label">Total ofertas</div><div class="metric-value">R$${tOf.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div><div class="metric"><div class="metric-label">Total bistrô</div><div class="metric-value">R$${tBi.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div><div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">R$${(tOf+tBi).toLocaleString('pt-BR',{maximumFractionDigits:0})}</div></div></div>
  <div class="card"><div class="card-title">Histórico por culto</div><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Espécie</th><th>PIX</th><th>Outras</th><th>Total</th></tr></thead><tbody>`;
  if(!fins.length)html+=`<tr><td colspan="5"><div class="empty-state">Sem registros.</div></td></tr>`;
  fins.forEach(f=>{
    const dt=f.cultos?.data?new Date(f.cultos.data+'T12:00:00').toLocaleDateString('pt-BR'):'—';
    const d=f.dados||{};const fm=v=>`R$${(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
    html+=`<tr><td>${dt}</td><td>${fm(d.especie)}</td><td>${fm(d.pix)}</td><td>${d.outras?fm(d.outras):'—'}</td><td style="font-weight:600">${fm(d.totalOferta)}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('content').innerHTML=html;
}

// ── USUÁRIOS (admin only)
async function renderUsuarios(){
  const {data:users}=await db.from('perfis').select('*').order('nome');
  let html=`<div class="sec-actions"><h2>Usuários</h2><button class="btn btn-primary btn-sm" onclick="openModalUser()">+ Novo usuário</button></div>
  <div class="card">`;
  if(!users||!users.length)html+=`<div class="empty-state"><div class="empty-icon">🔑</div>Nenhum usuário cadastrado.</div>`;
  else users.forEach(u=>{
    html+=`<div class="user-row"><div class="user-info"><div class="u-name">${u.nome}</div><div class="u-email">${u.email||'—'} · <span class="badge badge-gray">${ROLE_LABELS[u.role]||u.role}</span></div></div>
    <button class="btn btn-secondary btn-sm" onclick="deleteUser('${u.id}','${u.email}')">Remover</button></div>`;
  });
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}
function openModalUser(){
  document.getElementById('modal-title').textContent='Novo Usuário';
  document.getElementById('modal-body').innerHTML=`
    <div class="f"><label>Nome</label><input type="text" id="nu-nome" placeholder="Nome completo"></div>
    <div class="f"><label>Email</label><input type="email" id="nu-email" placeholder="email@email.com"></div>
    <div class="f"><label>Senha</label><input type="password" id="nu-senha" placeholder="Mínimo 6 caracteres"></div>
    <div class="f"><label>Perfil de acesso</label><select id="nu-role">
      <option value="lideranca">Liderança</option>
      <option value="recepcao">Recepção</option>
      <option value="bistro">Bistrô</option>
      <option value="midia">Mídia</option>
      <option value="financeiro">Financeiro</option>
      <option value="admin">Admin</option>
    </select></div>
    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="saveUser()">Criar usuário</button>
    <div id="user-err" style="color:#c00;font-size:13px;margin-top:8px"></div>`;
  document.getElementById('modal').classList.remove('hidden');
}
async function saveUser(){
  const nome=document.getElementById('nu-nome').value.trim();
  const email=document.getElementById('nu-email').value.trim();
  const senha=document.getElementById('nu-senha').value;
  const role=document.getElementById('nu-role').value;
  const err=document.getElementById('user-err');
  if(!nome||!email||!senha){err.textContent='Preencha todos os campos.';return;}
  if(senha.length<6){err.textContent='Senha mínima de 6 caracteres.';return;}
  const {data,error}=await db.auth.admin?db.auth.admin.createUser({email,password:senha,email_confirm:true}):await db.auth.signUp({email,password:senha});
  if(error){err.textContent='Erro: '+error.message;return;}
  const uid=data?.user?.id;
  if(uid)await db.from('perfis').upsert({id:uid,nome,email,role});
  toast('Usuário criado!');closeModal();renderUsuarios();
}
async function deleteUser(id,email){
  if(!confirm(`Remover usuário ${email}?`))return;
  await db.from('perfis').delete().eq('id',id);
  toast('Usuário removido.');renderUsuarios();
}

function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('l-senha').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// Check existing session
db.auth.getSession().then(({data:{session}})=>{if(session){currentUser=session.user;initApp();}});
</script>
